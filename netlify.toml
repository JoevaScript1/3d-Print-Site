[build]
  publish = "dist"
  command = "npm run build"
  environment = { SECRETS_SCAN_OMIT_KEYS = "SITE_URL" }

[[redirects]]
  from = "/sitemap.xml"
  to = "/sitemap.xml"
  status = 200
  force = true

[[redirects]]
  from = "/robots.txt"
  to = "/robots.txt"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
